name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  quality:
    name: Lint · Analyse · Test (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.1', '8.2', '8.4' ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, gd, mysqli, openssl
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Coding standards (PHPCS · WordPress)
        run: composer lint

      - name: Static analysis (PHPStan)
        run: composer analyse

      - name: Unit tests (PHPUnit)
        run: composer test

  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - name: Run WordPress Plugin Check
        uses: wordpress/plugin-check-action@v1
